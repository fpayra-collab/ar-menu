<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <title>{{ dish.name }}</title>
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <script type="module"
      src="https://unpkg.com/@google/model-viewer/dist/model-viewer.min.js">
    </script>
    <style>
      html, body { margin:0; padding:0; width:100%; height:100%; overflow:hidden; }
      model-viewer { width:100%; height:100%; background-color:#f0f0f0; }
      #dish-name { position:absolute; top:12px; left:12px; color:#333; font-weight:bold; }
    </style>
  </head>
  <body>
    <div id="dish-name">{{ dish.name }}</div>

    <model-viewer src="{{ dish.glb }}"
                  {% if dish.usdz %}ios-src="{{ dish.usdz }}"{% endif %}
                  ar
                  ar-modes="scene-viewer webxr quick-look"
                  camera-controls
                  autoplay
                  environment-image="neutral"
                  scale="{{ dish.scale }}">
      <button slot="ar-button" id="ar-button"
              style="position:absolute; bottom:16px; left:50%;
                     transform:translateX(-50%); padding:10px 16px;
                     border-radius:20px; border:none; background:#007bff;
                     color:#fff; font-size:14px;">
        View in your space
      </button>
    </model-viewer>
  </body>
</html>
